################################################################
# Ultimate Dashboard - Traefik static configuration
# Domain is set via APP_DOMAIN in .env → docker-compose.yml labels
################################################################

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true   # Traefik dashboard on :8080 - localhost / VPN access only

log:
  level: INFO

accessLog:
  bufferingSize: 100

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: ud-proxy-net

  file:
    directory: /dynamic
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: "{{ env \"ACME_EMAIL\" }}"
      storage: /acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudflare
        propagation:
          delayBeforeChecks: 30
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
