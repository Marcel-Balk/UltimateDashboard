################################################################
# Ultimate Dashboard - Docker Compose (build from source)
#
# GitHub:     https://github.com/Marcel-Balk/UltimateDashboard
# Docker Hub: https://hub.docker.com/r/extremedatacenter/ultimatedashboard
#
# Services:
#   traefik            - reverse proxy, TLS via Cloudflare DNS-01
#   ultimate-dashboard - PHP/Apache app (built from source)
#
# To use the pre-built image instead of building from source,
# replace the `build:` block with:
#   image: extremedatacenter/ultimatedashboard:latest
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values
#   2. mkdir -p data && touch data/acme.json && chmod 600 data/acme.json
#   3. docker compose up -d
################################################################

services:

  # ============================================================
  # Docker socket proxy (required for Docker 28+ / API >= 1.40)
  # ============================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ud-socket-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - SERVICES=0
      - NETWORKS=1
      - TASKS=0
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ud-proxy-net

  # ============================================================
  # Traefik reverse proxy
  # ============================================================
  traefik:
    image: traefik:latest
    container_name: ud-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ud-proxy-net
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic:/dynamic:ro
      - ./data/acme.json:/acme.json
    depends_on:
      - socket-proxy
    labels:
      - "traefik.enable=false"


  # ============================================================
  # Ultimate Dashboard (PHP/Apache - built from source)
  # Pre-built image: extremedatacenter/ultimatedashboard:latest
  # ============================================================
  ultimate-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: extremedatacenter/ultimatedashboard:latest
    container_name: ud-app
    restart: unless-stopped
    depends_on:
      - traefik
    networks:
      - ud-proxy-net
    volumes:
      - ./data:/data                                    # SQLite DB
      - ./uploads:/var/www/html/uploads/logos           # Logo uploads
    environment:
      - DB_PATH=/data/dashboard.db
      - UPLOAD_DIR=/var/www/html/uploads/logos
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ud.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.ud.entrypoints=websecure"
      - "traefik.http.routers.ud.tls=true"
      - "traefik.http.routers.ud.tls.certresolver=cloudflare"
      - "traefik.http.services.ud.loadbalancer.server.port=80"
      # Security headers
      - "traefik.http.middlewares.ud-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.ud-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ud-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.ud-headers.headers.stsSeconds=31536000"
      - "traefik.http.routers.ud.middlewares=ud-headers"

networks:
  ud-proxy-net:
    name: ud-proxy-net
    driver: bridge
